name: CI/CD Automated Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Add this environment variable to opt into Node.js 24 for GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # 1. Job: รันเทส Backend (Jest & Supertest)
  # ==========================================
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # 👈 เปลี่ยนจาก v3 เป็น v4 ตรงนี้

      - name: Setup Node.js
        uses: actions/setup-node@v4 # 👈 เปลี่ยนจาก v3 เป็น v4 ตรงนี้
        with:
          node-version: '18.x'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          MONGO_URI_TEST: mongodb://127.0.0.1:27017/logins_test_db
          JWT_SECRET: super_secret_test_key
        run: npm test

  # ==========================================
  # 2. Job: รันเทส Frontend (Playwright E2E)
  # ==========================================
  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests 
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # 👈 เปลี่ยนจาก v3 เป็น v4 ตรงนี้

      - name: Setup Node.js
        uses: actions/setup-node@v4 # 👈 เปลี่ยนจาก v3 เป็น v4 ตรงนี้
        with:
          node-version: '18.x'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Install Frontend Dependencies & Playwright
        working-directory: ./frontend
        run: |
          npm install
          npx playwright install --with-deps

      - name: Start Backend Server (Background)
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/logins_db
          JWT_SECRET: super_secret_test_key
          PORT: 5000
        run: npm start &

      - name: Start Frontend Live Server (Background)
        working-directory: ./frontend
        run: npx http-server . -p 5500 &

      - name: Wait for Servers to Boot Up
        run: sleep 5 

      - name: Run Playwright Tests
        working-directory: ./frontend
        run: npx playwright test