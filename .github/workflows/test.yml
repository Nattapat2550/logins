name: CI/CD Automated Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # 1. Job: รันเทส Backend (Jest & Supertest)
  # ==========================================
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          MONGO_URI_TEST: mongodb://127.0.0.1:27017/logins_test_db
          JWT_SECRET: super_secret_test_key
        run: npm test

  # ==========================================
  # 2. Job: รันเทส Frontend (Playwright E2E)
  # ==========================================
  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests # ต้องรอให้เทส Backend ผ่านก่อนถึงจะเริ่มเทส Frontend
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Install Playwright & http-server
        run: |
          npm init -y
          npm install -D @playwright/test http-server

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start Backend Server (Background)
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/logins_db
          JWT_SECRET: super_secret_test_key
          PORT: 5000
        run: npm start &

      - name: Start Frontend Live Server (Background)
        run: npx http-server ./frontend -p 5500 &

      - name: Wait for Servers to Boot Up
        run: sleep 5 # รอ 5 วินาทีให้เซิร์ฟเวอร์ทั้งสองรันเสร็จ

      - name: Run Playwright Tests
        run: npx playwright test