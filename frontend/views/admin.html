<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="left">Admin Panel</div>
      <div class="right">
        <img id="profilePic" src="../public/images/User.png" alt="Admin" />
        <div class="dropdown" id="profileDropdown">
          <button id="editProfileBtn">Edit Profile</button>
          <button id="changePasswordBtn">Change Password</button>
          <button id="deleteAccountBtn" class="secondary">Delete Account</button>
          <hr />
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>Admin Dashboard</h1>

    <h2>Manage Users</h2>
    <table id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Username</th>
          <th>Role</th>
          <th>Picture</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <hr />

    <h2>Home Page Content</h2>
    <form id="homeInfoForm">
      <label for="homeTitle">Title:</label>
      <input type="text" id="homeTitle" placeholder="Home page title" />

      <label for="homeContent">Content:</label>
      <textarea id="homeContent" rows="4" placeholder="Home page content"></textarea>

      <button type="submit">Update Home Page</button>
    </form>

    <div style="margin-top: 20px; text-align: center;">
      <button id="themeToggleBtn">Toggle Dark Theme</button>
    </div>

    <!-- Edit Profile Modal (hidden by default) -->
    <div id="editProfileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Edit Profile</h3>
        <form id="editProfileForm">
          <label for="newUsername">Username:</label>
          <input type="text" id="newUsername" placeholder="New username" />

          <label for="newPicture">Profile Picture URL:</label>
          <input type="url" id="newPicture" placeholder="https://example.com/image.jpg" />

          <div style="margin-top: 15px;">
            <button type="submit">Save Changes</button>
            <button type="button" id="closeEditModal" class="secondary" style="margin-left: 10px;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Change Password</h3>
        <form id="changePasswordForm">
          <label for="oldPassword">Old Password:</label>
          <input type="password" id="oldPassword" placeholder="Enter old password" required />

          <label for="newPassword">New Password:</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required />

          <div style="margin-top: 15px;">
            <button type="submit">Change Password</button>
            <button type="button" id="closeChangeModal" class="secondary" style="margin-left: 10px;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Account Confirmation Modal -->
    <div id="deleteConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Delete Account?</h3>
        <p>This action cannot be undone.</p>
        <div style="margin-top: 15px;">
          <button id="confirmDeleteBtn" class="secondary">Yes, Delete</button>
          <button id="closeDeleteModal" style="margin-left: 10px;">Cancel</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../public/js/main.js"></script>
  <script>
    const apiUrl = 'https://backendlogins.onrender.com/api'; // Update if your backend URL changes

    // Load user profile and admin data
    async function loadPage() {
      const user = await loadUserProfile('profilePic'); // From main.js (corrected function name)
      if (!user || user.role !== 'admin') {
        alert('Access denied. You must be an admin to view this page.');
        window.location.href = 'home.html';
        return;
      }

      // Load users table
      try {
        const res = await fetch(`${apiUrl}/admin/users`, { credentials: 'include' });
        if (res.ok) {
          const users = await res.json();
          const tbody = document.querySelector('#usersTable tbody');
          tbody.innerHTML = ''; // Clear existing rows
          users.forEach(u => {
            const row = tbody.insertRow();
            row.innerHTML = `
              <td>${u.id}</td>
              <td>${u.email}</td>
              <td>${u.username || 'N/A'}</td>
              <td>${u.role}</td>
              <td>
                <img src="${u.picture || '../public/images/User.png'}" 
                     alt="Profile" 
                     style="width: 30px; height: 30px; border-radius: 50%;" 
                     onerror="this.src='../public/images/User.png'" />
              </td>
            `;
          });
        } else {
          alert('Failed to load users. Check your admin permissions.');
        }
      } catch (err) {
        console.error('Error loading users:', err);
        alert('Error loading users.');
      }

      // Load home page info
      try {
        const res = await fetch(`${apiUrl}/admin/home-info`, { credentials: 'include' });
        if (res.ok) {
          const info = await res.json();
          document.getElementById('homeTitle').value = info.title || 'Welcome to the Home Page';
          document.getElementById('homeContent').value = info.content || 'This is the default content.';
        } else {
          alert('Failed to load home info.');
        }
      } catch (err) {
        console.error('Error loading home info:', err);
        alert('Error loading home info.');
      }
    }

    // Setup profile dropdown (from main.js)
    setupDropdown('profilePic', 'profileDropdown');

    // Theme toggle
    document.getElementById('themeToggleBtn').onclick = toggleTheme;

    // Logout
    document.getElementById('logoutBtn').onclick = logout;

    // Edit Profile Modal
    document.getElementById('editProfileBtn').onclick = () => {
      document.getElementById('editProfileModal').style.display = 'block';
    };

    document.getElementById('closeEditModal').onclick = () => {
      document.getElementById('editProfileModal').style.display = 'none';
      document.getElementById('editProfileForm').reset();
    };

    document.getElementById('editProfileForm').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('newUsername').value.trim();
      const picture = document.getElementById('newPicture').value.trim();

      const updates = {};
      if (username) updates.username = username;
      if (picture) updates.picture = picture;

      if (Object.keys(updates).length === 0) {
        alert('No changes to save.');
        return;
      }

      try {
        const res = await fetch(`${apiUrl}/me`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
          credentials: 'include',
        });
        if (res.ok) {
          alert('Profile updated successfully!');
          document.getElementById('editProfileModal').style.display = 'none';
          loadPage(); // Reload profile pic and data
        } else {
          const data = await res.json();
          alert(data.message || 'Failed to update profile.');
        }
      } catch (err) {
        console.error('Error updating profile:', err);
        alert('Error updating profile.');
      }
    };

    // Change Password Modal
    document.getElementById('changePasswordBtn').onclick = () => {
      document.getElementById('changePasswordModal').style.display = 'block';
    };

    document.getElementById('closeChangeModal').onclick = () => {
      document.getElementById('changePasswordModal').style.display = 'none';
      document.getElementById('changePasswordForm').reset();
    };

    document.getElementById('changePasswordForm').onsubmit = async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      if (!oldPassword || !newPassword) {
        alert('Please fill all fields.');
        return;
      }

      if (newPassword.length < 6) {
        alert('New password must be at least 6 characters.');
        return;
      }

      try {
        const res = await fetch(`${apiUrl}/me/password`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword, newPassword }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          alert('Password changed successfully!');
          document.getElementById('changePasswordModal').style.display = 'none';
          document.getElementById('changePasswordForm').reset();
        } else {
          alert(data.message || 'Failed to change password.');
        }
      } catch (err) {
        console.error('Error changing password:', err);
        alert('Error changing password.');
      }
    };

    // Delete Account Modal
    document.getElementById('deleteAccountBtn').onclick = () => {
      document.getElementById('deleteConfirmModal').style.display = 'block';
    };

    document.getElementById('closeDeleteModal').onclick = () => {
      document.getElementById('deleteConfirmModal').style.display = 'none';
    };

    document.getElementById('confirmDeleteBtn').onclick = async () => {
      try {
        const res = await fetch(`${apiUrl}/me`, {
          method: 'DELETE',
          credentials: 'include',
        });
        if (res.ok) {
          alert('Account deleted successfully. Redirecting to landing page.');
          window.location.href = 'index.html';
        } else {
          const data = await res.json();
          alert(data.message || 'Failed to delete account.');
        }
      } catch (err) {
        console.error('Error deleting account:', err);
        alert('Error deleting account.');
      }
      document.getElementById('deleteConfirmModal').style.display = 'none';
    };

    // Update Home Info Form
    document.getElementById('homeInfoForm').onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('homeTitle').value.trim();
      const content = document.getElementById('homeContent').value.trim();

      if (!title || !content) {
        alert('Please fill in both title and content.');
        return;
      }

      try {
        const res = await fetch(`${apiUrl}/admin/home-info`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          alert('Home page content updated successfully!');
        } else {
          alert(data.message || 'Failed to update home info.');
        }
      } catch (err) {
        console.error('Error updating home info:', err);
        alert('Error updating home info.');
      }
    };

    // Initialize page on load
    document.addEventListener('DOMContentLoaded', loadPage);
  </script>
</body>
</html>
