<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register / Login</title>
  <link rel="stylesheet" href="../public/css/style.css" />
</head>
<body>
  <main class="container">
    <h2>Complete Registration</h2>
    <form id="registerForm" style="display:none;">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>

    <h2>Or Login</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <label><input type="checkbox" id="hidePassword" checked /> Hide Password</label>
      <button type="submit">Login</button>
      <button type="button" id="forgotPasswordBtn">Forgot Password</button>
    </form>

    <h3>Or Login with Google</h3>
    <button id="googleLoginBtn">Login with Google</button>
  </main>

  <script src="../public/js/main.js"></script>
  <script>
    const apiUrl = 'https://backendlogins.onrender.com/api';

    const verifiedToken = sessionStorage.getItem('verifiedToken');
    const email = sessionStorage.getItem('email');
    if (verifiedToken && email) {
      document.getElementById('registerForm').style.display = 'block';
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return alert('Fill all fields');

      try {
        const res = await fetch(`${apiUrl}/register/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: verifiedToken, username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          alert('Registration successful!');
          sessionStorage.removeItem('verifiedToken');
          sessionStorage.removeItem('email');
          if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'home.html';
          }
        } else {
          alert(data.message);
        }
      } catch {
        alert('Registration failed');
      }
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return alert('Fill all fields');

      try {
        const res = await fetch(`${apiUrl}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          alert('Login successful!');
          if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'home.html';
          }
        } else {
          alert(data.message);
        }
      } catch {
        alert('Login failed');
      }
    };

    togglePasswordVisibility('hidePassword', 'loginPassword');

    document.getElementById('forgotPasswordBtn').onclick = () => {
      alert('Please contact support to reset your password.');
    };

    document.getElementById('googleLoginBtn').onclick = () => {
      window.location.href = 'https://backendlogins.onrender.com/auth/google';
    };
  </script>
</body>
</html>
