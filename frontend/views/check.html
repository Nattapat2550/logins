<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - Verify Email</title>
  <link rel="stylesheet" href="../public/css/style.css" />
</head>
<body>
  <main class="container">
    <h2>Register - Step 1: Enter Email</h2>
    <input type="email" id="email" placeholder="Enter your email" />
    <button id="sendCodeBtn">Send Verification Code</button>

    <div id="verifySection" style="display:none;">
      <h3>Enter Verification Code</h3>
      <input type="text" id="code" maxlength="6" placeholder="6-digit code" />
      <button id="verifyCodeBtn">Verify</button>
    </div>
  </main>

  <script>
    const apiUrl = 'https://backendlogins.onrender.com/api';

    document.getElementById('sendCodeBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) return alert('Enter email');
      try {
        const res = await fetch(`${apiUrl}/register/check-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (res.ok) {
          alert('Verification code sent to your email');
          document.getElementById('verifySection').style.display = 'block';
        } else {
          alert(data.message);
        }
      } catch {
        alert('Error sending code');
      }
    };

    document.getElementById('verifyCodeBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const code = document.getElementById('code').value.trim();
      if (!code || code.length !== 6) return alert('Enter 6-digit code');

      try {
        const res = await fetch(`${apiUrl}/register/verify-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code }),
        });
        const data = await res.json();
        if (res.ok) {
          alert('Email verified! Proceed to complete registration.');
          sessionStorage.setItem('verifiedToken', data.token);
          sessionStorage.setItem('email', email);
          window.location.href = 'form.html';
        } else {
          alert(data.message);
        }
      } catch {
        alert('Verification failed');
      }
    };
  </script>
</body>
</html>
