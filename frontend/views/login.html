<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <main class="container">
    <h2>Login</h2>
    <form id="loginForm">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <label>
        <input type="checkbox" id="hidePassword" checked />
        Hide Password
      </label>

      <button type="submit">Login</button>
    </form>

    <hr />

    <h3>Or Login with Google</h3>
    <button id="googleLoginBtn">Login with Google</button>

    <p style="margin-top: 20px;">Don't have an account? <a href="register.html">Register here</a></p>
  </main>

  <script src="../public/js/main.js"></script>  <!-- Your shared utilities -->
  <script src="../public/js/auth.js"></script>  <!-- FIXED: Source auth.js -->
  <script>
    // Toggle password visibility (from main.js)
    togglePasswordVisibility('hidePassword', 'password');

    // FIXED: Use auth.js functions (line ~128 was likely here)
    document.addEventListener('DOMContentLoaded', () => {
      // Optional: Auto-check email on blur (if you want real-time validation)
      const emailInput = document.getElementById('email');
      emailInput.addEventListener('blur', async () => {
        const email = emailInput.value.trim();
        if (email) {
          try {
            await checkEmailExists(email);  // From auth.js
            // If exists, maybe show "Email found" or proceed
          } catch (error) {
            // Ignore if not registering
          }
        }
      });

      // Login form submit
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) {
          showAlert('Please fill all fields.', 'error');  // From auth.js
          return;
        }
        await handleLogin(email, password);  // From auth.js
      };

      // Google login
      document.getElementById('googleLoginBtn').onclick = handleGoogleLogin;  // From auth.js
    });
  </script>
</body>
</html>
