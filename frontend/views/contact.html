<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - My Website</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="left">My Website</div>
      <div class="right">
        <a href="index.html" style="color: white; margin-right: 10px;">Home</a>
        <a href="about.html" style="color: white;">About</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Have questions? Reach out via the form below or email us at example@domain.com.</p>

    <form id="contactForm">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Your name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Your email" required />

      <label for="message">Message:</label>
      <textarea id="message" rows="5" placeholder="Your message" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9em; color: #666;">
      Note: This is a demo form. In production, integrate with a backend endpoint to handle submissions.
    </p>

    <div style="margin-top: 20px; text-align: center;">
      <button onclick="window.location.href='index.html'" class="secondary">Back to Home</button>
    </div>
  </main>

  <script src="../public/js/main.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('contactForm').onsubmit = (e) => {
      e.preventDefault();
      alert('Message sent! (Demo - no real submission in this version.)');
      document.getElementById('contactForm').reset();
    };
  </script>
</body>
</html>
