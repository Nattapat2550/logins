<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <main class="container">
    <h2>Register</h2>
    <form id="registerForm">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <button type="button" id="sendCodeBtn">Send Verification Code</button>

      <div id="verifySection" style="display:none; margin-top: 15px;">
        <label for="code">Verification Code:</label>
        <input type="text" id="code" maxlength="6" placeholder="Enter 6-digit code" required />
        <button type="button" id="verifyCodeBtn">Verify Code</button>
      </div>

      <div id="completeSection" style="display:none; margin-top: 15px;">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Choose a username" required />

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Choose a password" required />

        <button type="submit">Complete Registration</button>
      </div>
    </form>

    <hr />

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </main>

  <script src="../public/js/main.js"></script>
  <script src="../public/js/auth.js"></script>  <!-- FIXED: Source auth.js -->
  <script>
    let verifiedToken = null;
    let userEmail = null;

    document.addEventListener('DOMContentLoaded', () => {
      const sendCodeBtn = document.getElementById('sendCodeBtn');
      const verifyCodeBtn = document.getElementById('verifyCodeBtn');
      const registerForm = document.getElementById('registerForm');

      sendCodeBtn.onclick = async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
          showAlert('Please enter your email.', 'error');
          return;
        }
        try {
          // First check if email exists
          await checkEmailExists(email);  // From auth.js
          // If no error, send code (assuming backend handles existence in send-code)
          await sendVerificationCode(email);  // From auth.js
          userEmail = email;
          document.getElementById('verifySection').style.display = 'block';
        } catch (error) {
          // Backend might return { exists: true } - handle accordingly
          if (error.message.includes('exists')) {
            showAlert('Email already registered. Please login.', 'error');
          }
        }
      };

      verifyCodeBtn.onclick = async () => {
        const code = document.getElementById('code').value.trim();
        if (!code || code.length !== 6) {
          showAlert('Please enter a 6-digit code.', 'error');
          return;
        }
        try {
          verifiedToken = await verifyCode(userEmail, code);  // From auth.js
          showAlert('Email verified! Complete registration.', 'success');
          document.getElementById('completeSection').style.display = 'block';
        } catch (error) {
          showAlert('Invalid or expired code.', 'error');
        }
      };

      registerForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!verifiedToken) {
          showAlert('Please verify your email first.', 'error');
          return;
        }
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          showAlert('Please fill all fields.', 'error');
          return;
        }
        await handleRegister(verifiedToken, username, password);  // From auth.js
      };
    });
  </script>
</body>
</html>
