<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Dashboard</title>
  <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="left">My Website</div>
      <div class="right">
        <img id="profilePic" src="../public/images/User.png" alt="User  " />
        <div class="dropdown" id="profileDropdown">
          <button id="editProfileBtn">Edit Profile</button>
          <button id="changePasswordBtn">Change Password</button>
          <button id="deleteAccountBtn" class="secondary">Delete Account</button>
          <hr />
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1 id="welcomeTitle">Welcome</h1>
    <p id="homeContent">Loading...</p>

    <div style="margin-top: 20px; text-align: center;">
      <button id="themeToggleBtn">Toggle Dark Theme</button>
    </div>

    <!-- Edit Profile Modal (hidden by default) -->
    <div id="editProfileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Edit Profile</h3>
        <form id="editProfileForm">
          <label for="newUsername">Username:</label>
          <input type="text" id="newUsername" placeholder="New username" />

          <label for="newPicture">Profile Picture URL:</label>
          <input type="url" id="newPicture" placeholder="https://example.com/image.jpg" />

          <div style="margin-top: 15px;">
            <button type="submit">Save Changes</button>
            <button type="button" id="closeEditModal" class="secondary" style="margin-left: 10px;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Change Password</h3>
        <form id="changePasswordForm">
          <label for="oldPassword">Old Password:</label>
          <input type="password" id="oldPassword" placeholder="Enter old password" required />

          <label for="newPassword">New Password:</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required />

          <div style="margin-top: 15px;">
            <button type="submit">Change Password</button>
            <button type="button" id="closeChangeModal" class="secondary" style="margin-left: 10px;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Account Confirmation -->
    <div id="deleteConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="background: white; margin: 100px auto; padding: 20px; max-width: 400px; border-radius: 10px;">
        <h3>Delete Account?</h3>
        <p>This action cannot be undone.</p>
        <div style="margin-top: 15px;">
          <button id="confirmDeleteBtn" class="secondary">Yes, Delete</button>
          <button id="closeDeleteModal" style="margin-left: 10px;">Cancel</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../public/js/main.js"></script>
  <script>
    // Load user profile and home info
    async function loadPage() {
      const user = await loadUserProfile('profilePic', 'welcomeTitle', 'homeContent');
      if (!user) return;

      // Load home page info from admin
      try {
        const res = await fetch(`${apiUrl}/admin/home-info`, { credentials: 'include' });
        if (res.ok) {
          const info = await res.json();
          document.getElementById('welcomeTitle').textContent = info.title;
          document.getElementById('homeContent').innerHTML = `<p>${info.content}</p>`;
        }
      } catch {
        // Non-admin users can still see default content
        document.getElementById('homeContent').textContent = 'Welcome to your dashboard! You can edit your profile or change your password.';
      }
    }

    // Setup dropdown
    setupDropdown('profilePic', 'profileDropdown');

    // Event listeners
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    document.getElementById('logoutBtn').onclick = logout;

    document.getElementById('editProfileBtn').onclick = () => {
      document.getElementById('editProfileModal').style.display = 'block';
    };

    document.getElementById('closeEditModal').onclick = () => {
      document.getElementById('editProfileModal').style.display = 'none';
    };

    document.getElementById('editProfileForm').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('newUsername').value.trim();
      const picture = document.getElementById('newPicture').value.trim();

      const updates = {};
      if (username) updates.username = username;
      if (picture) updates.picture = picture;

      if (Object.keys(updates).length === 0) return alert('No changes made.');

      try {
        const res = await fetch(`${apiUrl}/me`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates),
          credentials: 'include',
        });
        if (res.ok) {
          alert('Profile updated!');
          document.getElementById('editProfileModal').style.display = 'none';
          loadPage(); // Reload profile pic
        } else {
          alert('Failed to update profile.');
        }
      } catch {
        alert('Error updating profile.');
      }
    };

    document.getElementById('changePasswordBtn').onclick = () => {
      document.getElementById('changePasswordModal').style.display = 'block';
    };

    document.getElementById('closeChangeModal').onclick = () => {
      document.getElementById('changePasswordModal').style.display = 'none';
    };

    document.getElementById('changePasswordForm').onsubmit = async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      if (!oldPassword || !newPassword) return alert('Please fill all fields.');

      try {
        const res = await fetch(`${apiUrl}/me/password`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword, newPassword }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          alert('Password changed successfully!');
          document.getElementById('changePasswordModal').style.display = 'none';
          document.getElementById('oldPassword').value = '';
          document.getElementById('newPassword').value = '';
        } else {
          alert(data.message || 'Failed to change password.');
        }
      } catch {
        alert('Error changing password.');
      }
    };

    document.getElementById('deleteAccountBtn').onclick = () => {
      document.getElementById('deleteConfirmModal').style.display = 'block';
    };

    document.getElementById('closeDeleteModal').onclick = () => {
      document.getElementById('deleteConfirmModal').style.display = 'none';
    };

    document.getElementById('confirmDeleteBtn').onclick = async () => {
      try {
        const res = await fetch(`${apiUrl}/me`, { method: 'DELETE', credentials: 'include' });
        if (res.ok) {
          alert('Account deleted. Redirecting to home.');
          window.location.href = 'index.html';
        } else {
          alert('Failed to delete account.');
        }
      } catch {
        alert('Error deleting account.');
      }
      document.getElementById('deleteConfirmModal').style.display = 'none';
    };

    // Initialize
    loadPage();
  </script>
</body>
</html>
