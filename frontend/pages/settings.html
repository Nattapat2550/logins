<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-mode.css">
</head>
<body class="light">
    <header>
        <nav class="container">
            <h1>Settings</h1>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li id="adminLink"><a href="admin.html">Admin</a></li>
                <li><button id="logoutBtn">Logout</button></li>
                <li><button id="darkModeToggle" onclick="toggleDarkMode()">🌙 Dark Mode</button></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <div class="card">
            <h2>Update Profile</h2>
            <form id="updateProfileForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="file" id="profilePicInput" accept="image/*">
                <img id="profilePic" src="../assets/user.png" alt="Current Profile" class="profile-pic">
                <div id="profileError" class="error"></div>
                <button type="submit">Update Profile</button>
            </form>
        </div>
        <div class="card">
            <h3>Account Actions</h3>
            <button id="deleteAccount" style="background: #ea4335; color: white;">Delete Account</button>
            <p><em>This action is permanent.</em></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 My Website.</p>
    </footer>
    <script src="../js/darkModeToggle.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
