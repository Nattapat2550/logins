<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dark-mode.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="light">
    <header>
        <nav class="container">
            <h1>Register</h1>
            <ul>
                <li><a href="/pages/index.html">Home</a></li>
                <li><a href="/pages/login.html">Login</a></li>
                <li><button id="darkModeToggle" onclick="toggleDarkMode()">🌙 Dark Mode</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="registerForm">
            <h2>Enter Your Email</h2>
            <input type="email" id="email" placeholder="Email" required>
            <div id="emailError" class="error"></div>
            <button type="submit">Next</button>
        </form>
        <p style="text-align: center; margin: 20px;">Or sign up with</p>
        <div id="g_id_onload"
             data-client_id="542247623824-u1re8o6fc4avn0h94ppe74e87khu95ml.apps.googleusercontent.com"
             data-callback="handleGoogleRegister"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" style="text-align: center;"></div>
    </main>
    <footer>
        <p>&copy; 2024 My Website.</p>
    </footer>
    <script src="/js/darkModeToggle.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
