<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error { border-color: var(--danger) !important; }
        .error-message { 
            color: var(--danger); 
            font-size: 0.875rem; 
            margin-top: 0.25rem; 
            display: none;
        }
        .success-message { 
            color: var(--success); 
            font-size: 0.875rem; 
            margin-top: 0.25rem; 
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page">
            <div class="card page-card">
                <h2 class="text-center">Welcome to AuthSystem</h2>
                <p class="text-center mb-4">Choose how you'd like to access your account</p>
                
                <!-- Tabs Navigation -->
                <div class="tab-container">
                    <button class="tab active" id="register-tab-btn">Register</button>
                    <button class="tab" id="login-tab-btn">Login</button>
                </div>
                
                <!-- Register Tab Content -->
                <div id="register-tab-content" class="tab-content active">
                    <form id="register-form" class="mt-4">
                        <div class="form-group">
                            <label for="register-email">Email Address</label>
                            <input type="email" id="register-email" placeholder="Enter your email" required>
                            <div id="register-email-error" class="error-message"></div>
                            <div id="register-email-success" class="success-message"></div>
                        </div>
                        <button type="submit" class="btn mt-3">Send Verification Code</button>
                    </form>
                    
                    <div class="or-divider mt-4">
                        <span>or continue with</span>
                    </div>
                    
                    <button class="btn btn-secondary mt-3" onclick="loginWithGoogle()" style="width: 100%">
                        <span>Sign up with Google</span>
                    </button>
                </div>
                
                <!-- Login Tab Content -->
                <div id="login-tab-content" class="tab-content">
                    <form id="login-form" class="mt-4">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="Enter your password" required>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="login-hash-password">
                                Enable password hashing
                            </label>
                        </div>
                        <button type="submit" class="btn mt-3">Login</button>
                        
                        <div class="mt-3">
                            <a href="#" onclick="showForgotPassword()" class="text-small">Forgot password?</a>
                        </div>
                    </form>
                    
                    <div class="or-divider mt-4">
                        <span>or continue with</span>
                    </div>
                    
                    <button class="btn btn-secondary mt-3" onclick="loginWithGoogle()" style="width: 100%">
                        <span>Sign in with Google</span>
                    </button>
                </div>
                
                <div class="text-center mt-4">
                    <p>By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Tab switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            const registerTabBtn = document.getElementById('register-tab-btn');
            const loginTabBtn = document.getElementById('login-tab-btn');
            const registerTabContent = document.getElementById('register-tab-content');
            const loginTabContent = document.getElementById('login-tab-content');
            
            registerTabBtn.addEventListener('click', () => {
                registerTabBtn.classList.add('active');
                loginTabBtn.classList.remove('active');
                registerTabContent.classList.add('active');
                loginTabContent.classList.remove('active');
            });
            
            loginTabBtn.addEventListener('click', () => {
                loginTabBtn.classList.add('active');
                registerTabBtn.classList.remove('active');
                loginTabContent.classList.add('active');
                registerTabContent.classList.remove('active');
            });
            
            // Real-time email validation for registration
            const registerEmail = document.getElementById('register-email');
            if (registerEmail) {
                registerEmail.addEventListener('blur', function() {
                    const email = this.value.trim();
                    if (email) {
                        checkEmailExists(email);
                    }
                });
            }
        });
        
        function showForgotPassword() {
            alert('Password reset functionality would be implemented here. An email with reset instructions would be sent.');
        }
    </script>
</body>
</html>
