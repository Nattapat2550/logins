<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <button id="googleLogin" class="btn btn-secondary">Login with Google</button>
        <p id="message"></p>
        <a href="register.html">Not registered? Register</a>
        <a href="#" id="forgotLink">Forgot Password?</a>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('password').value;
            const response = await login(email, password);
            showMessage(response.message || response.error, response.success);
            if (response.success) {
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));
                setTimeout(() => window.location.href = 'home.html', 1500);
            }
        });

        document.getElementById('googleLogin').addEventListener('click', () => {
            window.location.href = `${BACKEND_URL}/auth/google`;
        });

        document.getElementById('forgotLink').addEventListener('click', () => {
            const email = prompt('Enter your email for reset:');
            if (email) {
                forgotPassword(email).then(response => {
                    showMessage(response.message || response.error, response.success);
                }).catch(err => showMessage('Error: ' + err.message, false));
            }
        });
    </script>
</body>
</html>
