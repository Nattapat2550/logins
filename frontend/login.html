<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">  <!-- Your global styles -->
  <style>
    /* Login-specific styles */
    .form-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .error { color: red; margin-top: 5px; }
    .links { text-align: center; margin-top: 15px; }
    .links a { color: #007bff; text-decoration: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Login</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6">
      </div>
      
      <button type="button" onclick="login()">Login</button>
    </form>
    
    <div id="message"></div>  <!-- For error/success -->
    
    <div class="links">
      <p>Don't have an account? <a href="register.html">Register here</a></p>
      <p><a href="forgot-password.html">Forgot Password?</a></p>  <!-- Create if needed -->
    </div>
  </div>

  <script src="js/main.js"></script>  <!-- Your shared API helper -->
  <script src="js/login.js"></script>  <!-- Login-specific logic -->
</body>
</html>
