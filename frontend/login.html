<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <form id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <label>
      <input type="checkbox" id="hidePassword"> Hide Password
    </label>
    <button type="submit">Login</button>
    <button type="button" id="googleLogin">Login with Google</button>
  </form>

  <form id="forgotForm" style="margin-top: 1rem;">
    <h3>Forgot Password?</h3>
    <input type="email" id="forgotEmail" placeholder="Email" required>
    <button type="submit">Send Reset Code</button>
  </form>

  <div id="resetSection" style="display: none; margin-top: 1rem;">
    <h3>Reset Password</h3>
    <input type="text" id="resetCode" placeholder="Reset Code" required>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <button type="button" onclick="document.getElementById('loginForm').dispatchEvent(new Event('submit'))">Reset & Login</button>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
