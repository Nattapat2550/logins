<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Or login with:</p>
        <a href="/api/auth/google" class="google-btn">Login with Google</a>
        <p><a href="#" id="forgot">Forgot Password?</a> | <a href="register.html">No account? Register</a></p>
        <div id="message"></div>
    </div>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return showMessage('Email and password required', 'error');
            login(email, password);
        });

        document.getElementById('forgot').addEventListener('click', e => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (email) {
                forgotPassword(email);
            } else {
                showMessage('Enter your email first', 'error');
            }
        });
    </script>
</body>
</html>
