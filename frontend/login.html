<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Login App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Login</h1>
        <nav><ul></ul></nav>
    </header>
    <main>
        <form id="loginForm">
            <label for="loginEmail">Email:</label>
            <input type="email" id="loginEmail" required maxlength="254">
            <label for="loginPassword">Password:</label>
            <input type="password" id="loginPassword" required minlength="8">
            <label><input type="checkbox" id="rememberCheckbox"> Remember me</label>
            <label><input type="checkbox" id="hidePasswordCheckbox"> Hide password</label>
            <button type="button" id="loginBtn">Login</button>
            <button type="button" id="googleBtn">Sign in with Google</button>
            <div id="error"></div>
            <div id="success"></div>
        </form>
        <p>No account? <a href="register.html">Register</a></p>
        <p><a href="reset.html">Forgot Password?</a></p>
    </main>
    <footer>
        <p>&copy; 2023 Login App</p>
    </footer>
    <script src="js/main.js" defer></script>
    <script src="js/login.js" defer></script>
</body>
</html>
