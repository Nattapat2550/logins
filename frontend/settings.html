<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">Website Name</div>
        <div class="nav-center">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <img id="profileImg" src="" alt="Profile" onclick="toggleDropdown()">
            <div id="dropdown" class="dropdown" style="display:none;">
                <a href="home.html">Home</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Settings</h2>
        <form id="profileForm">
            <input type="text" id="username" placeholder="Username">
            <input type="file" id="profilePic" accept="image/*">
            <button type="submit">Update Profile</button>
        </form>
        <button id="themeToggle">Toggle Dark/Light Mode</button>
        <button id="deleteAccount" onclick="deleteAccount()">Delete Account</button>
    </div>
    <div id="message"></div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Protected
        if (!localStorage.getItem('token') || !localStorage.getItem('user')) {
            window.location.href = 'login.html';
            return;
        }
        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('profileImg').src = `${API_BASE.replace('/api', '')}/uploads/${user.profile_pic || 'user.png'}`;
        document.getElementById('profileImg').title = user.username || user.email;
        document.getElementById('username').value = user.username || '';

        // Update profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const file = document.getElementById('profilePic').files[0];
            const formData = new FormData();
            formData.append('username', username);
            if (file) formData.append('profilePic', file);

            const result = await updateProfile(formData);
            if (result.success) {
                localStorage.setItem('user', JSON.stringify(result.user));
                document.getElementById('message').textContent = 'Profile updated';
                // Reload img
                document.getElementById('profileImg').src = `${API_BASE.replace('/api', '')}/uploads/${result.user.profile_pic}`;
            } else {
                document.getElementById('message').textContent = result.error;
            }
        });

        // Theme toggle already in ui.js, but button click
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // Delete account
        window.deleteAccount = async () => {
            if (confirm('Delete account?')) {
                const result = await deleteAccount();
                if (result.success) {
                    logout();
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('message').textContent = result.error;
                }
            }
        };

        initUI();
    </script>
</body>
</html>
