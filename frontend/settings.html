<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Login App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="home.html" class="logo">Login App</a>
    <ul id="navLinks">
      <li><a href="home.html">Home</a></li>
      <li id="adminLink" class="hidden"><a href="admin.html">Admin</a></li>
      <li><button id="logoutBtn" class="secondary">Logout</button></li>
      <li><button id="themeToggle" class="theme-toggle">🌙</button></li>
    </ul>
  </nav>

  <main>
    <div class="container">
      <h1>Profile Settings</h1>
      <form id="settingsForm">
        <input type="text" id="username" placeholder="Username" required minlength="3">
        <input type="file" id="profilePic" accept="image/*">
        <img id="profilePreview" src="images/user.png" alt="Preview" class="hidden" style="width: 100px; height: 100px; border-radius: 50%;">
        <button type="submit">Update Profile</button>
      </form>
      <div id="alert" class="alert hidden"></div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/settings.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      setupNavbar();
      loadSettingsData();
    });
  </script>
</body>
</html>
