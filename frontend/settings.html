<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Login App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Settings</h1>
        <nav><ul></ul></nav>
    </header>
    <main>
        <form id="settingsForm">
            <label for="settingsUsername">Username:</label>
            <input type="text" id="settingsUsername" minlength="3" maxlength="30">
            <label for="passwordInput">New Password:</label>
            <input type="password" id="passwordInput" minlength="8">
            <label for="avatarInput">Profile Picture:</label>
            <input type="file" id="avatarInput" accept="image/jpeg,image/png">
            <img id="currentAvatar" src="/images/user.png" alt="Current Avatar" class="profile" style="display: none;">
            <label><input type="checkbox" id="themeToggle"> Dark Theme</label>
            <button type="button" id="saveSettingsBtn">Save</button>
            <button type="button" id="deleteAccountBtn" style="background: red;">Delete Account</button>
            <div id="error"></div>
            <div id="success"></div>
        </form>
    </main>
    <footer>
        <p>&copy; 2023 Login App</p>
    </footer>
    <script src="js/main.js" defer></script>
    <script src="js/settings.js" defer></script>
</body>
</html>
