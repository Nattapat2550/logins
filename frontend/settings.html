<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h2>Settings</h2>
    <div id="error" class="hidden"></div>
    <div id="success" class="hidden"></div>

    <h3>Edit Profile</h3>
    <form id="update-profile">
      <input type="text" id="username" placeholder="New Username" required>
      <input type="file" id="profile-pic-upload" accept="image/*">
      <button type="submit">Update Profile</button>
    </form>

    <h3>Theme</h3>
    <button id="dark-toggle">Toggle Dark Mode</button>

    <h3>Account</h3>
    <button id="delete-account" style="background-color: #dc3545;">Delete Account</button>
  </div>
  <script src="../js/common.js"></script>
  <script src="../js/profile.js"></script>
  <script src="../js/darkModeToggle.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = window.common.checkAuth();
      if (!user) return;
      window.common.renderNavbar(user);
      window.common.applyDarkMode();

      // Pre-fill form
      document.getElementById('username').value = user.username;

      // Show/hide messages
      const showMessage = (el, msg, isError = false) => {
        el.textContent = msg;
        el.classList.toggle('hidden', false);
        el.style.color = isError ? 'red' : 'green';
        setTimeout(() => el.classList.add('hidden'), 3000);
      };

      // Override profile.js handlers to use showMessage
      const originalError = document.getElementById('error');
      const originalSuccess = document.getElementById('success');
      // profile.js already sets them; this ensures visibility
    });
  </script>
</body>
</html>
