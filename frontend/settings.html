<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Settings</title>
  <meta name="description" content="Account settings page in MySite for updating profile and avatar.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://backendlogins.onrender.com" crossorigin>
  <link rel="dns-prefetch" href="https://backendlogins.onrender.com">
  <link rel="preload" href="css/style.css" as="style">
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="nav">
    <div class="brand">MySite</div>
    <div class="links">
      <a href="home.html">Home</a>
      <button id="themeToggle">🌓</button>
    </div>
  </nav>
  <main class="container">
    <h2>Settings</h2>
    <form id="settingsForm">
      <label>Username</label>
      <input type="text" id="username" />
      <div class="row">
        <div style="flex:1;">
          <label>First Name</label>
          <input type="text" id="first_name" />
        </div>
        <div style="flex:1; margin-left: 10px;">
          <label>Last Name</label>
          <input type="text" id="last_name" />
        </div>
      </div>
      <label>Telephone</label>
      <input type="tel" id="tel" />
      <button class="btn" type="submit">Save</button>
    </form>

    <hr/>
    <button id="deleteBtn" class="btn danger">Deactivate / Delete my account</button>
    <p id="msg" class="muted"></p>
  </main>
  <script src="js/main.js" defer></script>
  <script src="js/settings.js" defer></script>
</body>
</html>
