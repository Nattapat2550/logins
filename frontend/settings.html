<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>Settings</h1>
    <form id="settingsForm">
      <input type="text" id="username" placeholder="New Username">
      <input type="file" id="profilePic" accept="image/*">
      <button type="button" onclick="updateProfile()">Update Profile</button>
      <button type="button" id="themeToggle" onclick="toggleTheme()">Toggle Theme</button>
      <button type="button" onclick="deleteAccount()" style="background: red;">Delete Account</button>
    </form>
    <div id="error"></div>
    <div id="success" class="hidden"></div>
    <div id="currentProfile">
      <h2>Current Profile</h2>
      <p id="currentUsername"></p>
      <img id="currentPic" src="" alt="Profile" style="width: 100px; height: 100px; border-radius: 50%;">
    </div>
  </div>
  <script src="js/main.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
