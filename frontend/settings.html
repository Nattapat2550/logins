<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <nav id="navbar">
            <h2>Settings</h2>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </nav>
        <div id="settingsContent">
            <h3>Profile</h3>
            <p id="profileInfo"></p>
            <form id="updateForm">
                <input type="text" id="newUsername" placeholder="New Username">
                <input type="url" id="profilePic" placeholder="Profile Pic URL (optional)">
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
        </div>
        <p id="message"></p>
        <a href="home.html" class="btn btn-info">Back to Home</a>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || !user.id) {
            window.location.href = 'login.html';
            return;
        }

        // Load settings
        getSettings().then(response => {
            if (response.success) {
                const u = response.user;
                document.getElementById('profileInfo').innerHTML = `
                    <p>Email: ${u.email}</p>
                    <p>Username: ${u.username || 'Not set'}</p>
                    <p>Role: ${u.role}</p>
                    <p>Joined: ${new Date(u.created_at).toLocaleDateString()}</p>
                    ${u.profile_pic ? `<img src="${u.profile_pic}" alt="Profile" width="100">` : ''}
                `;
            }
        });

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const profilePic = document.getElementById('profilePic').value;
            const response = await updateSettings(username, profilePic);
            showMessage(response.message || response.error, response.success);
            if (response.success) {
                localStorage.setItem('user', JSON.stringify(response.user));
                window.location.reload();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
