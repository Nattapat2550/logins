<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">AuthSystem</a>
        
        <div class="navbar-nav">
            <a href="home.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link">Contact</a>
            
            <div id="auth-buttons" class="hidden">
                <a href="index.html" class="btn">Login</a>
            </div>
            
            <div id="user-menu" class="user-menu hidden">
                <img src="images/User.png" alt="User" class="user-avatar" id="user-avatar">
                <div class="dropdown-menu" id="dropdown-menu">
                    <span class="dropdown-item" id="user-name">Username</span>
                    <a href="settings.html" class="dropdown-item">Settings</a>
                    <a href="#" class="dropdown-item" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page">
            <h1>Account Settings</h1>
            
            <div class="card mt-4">
                <h3>Profile Information</h3>
                <form id="profile-form" class="mt-3">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" value="CurrentUsername">
                    </div>
                    <div class="form-group">
                        <label for="profile-pic">Profile Picture</label>
                        <input type="file" id="profile-pic" accept="image/*">
                    </div>
                    <button type="submit" class="btn">Update Profile</button>
                </form>
            </div>
            
            <div class="card mt-4">
                <h3>Appearance</h3>
                <button id="theme-toggle" class="btn btn-secondary mt-3">Toggle Dark Mode</button>
            </div>
            
            <div class="card mt-4">
                <h3>Danger Zone</h3>
                <button class="btn btn-danger mt-3" onclick="confirmDeleteAccount()">Delete Account</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function confirmDeleteAccount() {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                // Call API to delete account
                alert('Account deletion request sent.');
            }
        }
    </script>
</body>
</html>
