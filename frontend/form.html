<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile - Login App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">Login App</a>
    <ul id="navLinks">
      <li><a href="login.html">Login</a></li>
      <li><button id="themeToggle" class="theme-toggle">🌙</button></li>
    </ul>
  </nav>

  <main>
    <div class="container">
      <h1>Complete Your Profile</h1>
      <form id="formForm">
        <input type="text" id="username" placeholder="Choose a username" required minlength="3">
        <div id="passwordGroup">
          <input type="password" id="password" placeholder="Create password (min 6 chars)" required minlength="6">
          <input type="password" id="confirmPassword" placeholder="Confirm password" required minlength="6">
        </div>
        <input type="file" id="profilePic" accept="image/*">
        <img id="profilePreview" src="images/user.png" alt="Preview" class="hidden">
        <input type="hidden" id="google" value="false">
        <input type="hidden" id="tempToken">
        <button type="submit">Complete Registration</button>
      </form>
      <div id="alert" class="alert hidden"></div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/form.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      setupNavbar();
      setupForm();
    });
  </script>
</body>
</html>
