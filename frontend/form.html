<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Complete Profile</title>
  <meta name="description" content="Set your username and profile.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://backendlogins.onrender.com" crossorigin>
  <link rel="dns-prefetch" href="https://backendlogins.onrender.com">
  <link rel="preload" href="css/style.css" as="style">
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="nav">
    <div class="brand">MySite</div>
    <div class="links"><a href="index.html">Home</a><button id="themeToggle">🌓</button></div>
  </nav>
  <main class="container">
    <h2>Set your profile & password</h2>
    <form id="profileForm">
      <label>Email</label>
      <input type="email" id="email" required readonly style="background-color: var(--bg-hover);" />
      
      <div class="row">
        <div style="flex:1;">
          <label>First Name</label>
          <input type="text" id="first_name" />
        </div>
        <div style="flex:1; margin-left: 10px;">
          <label>Last Name</label>
          <input type="text" id="last_name" />
        </div>
      </div>
      
      <label>Telephone</label>
      <input type="tel" id="tel" />
      
      <label>Username</label>
      <input type="text" id="username" minlength="3" required />
      
      <label>Password</label>
      <input type="password" id="password" minlength="8" required />
      
      <button class="btn" type="submit">Save Profile</button>
    </form>
    <p id="msg" class="muted"></p>
  </main>
  <script src="js/main.js" defer></script>
  <script src="js/form.js" defer></script>
</body>
</html>
