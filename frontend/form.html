<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Complete Your Profile</h2>
        <form id="profileForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <label><input type="checkbox" id="showPassword"> Show Password</label>
            <button type="submit">Complete Registration</button>
        </form>
        <div id="message"></div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Check for Google auto-login (URL params)
        const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const userStr = urlParams.get('user');
    if (token && userStr) {
        try {
            const user = JSON.parse(decodeURIComponent(userStr));
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(user));
            console.log('Google auto-login: Skipping form, redirecting to', user.role === 'admin' ? 'admin.html' : 'home.html');
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'home.html';
            }
            return;  // Exit script - don't show form
        } catch (err) {
            console.error('Google param parse error:', err);
            showMessage('Invalid Google login. Please try again.', true);
        }
    }

        // Password toggle
        document.getElementById('showPassword').addEventListener('change', (e) => {
            const pw = document.getElementById('password');
            pw.type = e.target.checked ? 'text' : 'password';
        });

        // Form submit (email complete)
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = localStorage.getItem('tempEmail');
            if (!email) {
                showMessage('No email found. Please register again.', true);
                return;
            }
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = await completeProfile(email, username, password);
            showMessage(result.message || result.error, !result.success);
            if (result.success) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                localStorage.removeItem('tempEmail');
                if (result.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'home.html';
                }
            }
        });

        initUI();
    </script>
</body>
</html>
