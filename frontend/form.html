<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Complete Your Profile</h2>
        <p id="emailDisplay"></p>
        <form id="completeForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
            <button type="submit" class="btn btn-primary">Complete Registration</button>
        </form>
        <p id="message"></p>
        <a href="login.html">Back to Login</a>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('emailDisplay').textContent = `Email: ${email}`;
        }

        document.getElementById('completeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const response = await completeProfile(email, username, password);
            showMessage(response.message || response.error, response.success);
            if (response.success) {
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));
                setTimeout(() => window.location.href = 'home.html', 2000);
            }
        });
    </script>
</body>
</html>
