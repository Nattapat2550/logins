<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - Login App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Complete Profile</h1>
        <nav><ul></ul></nav>
    </header>
    <main>
        <form id="completeForm">
            <label for="usernameInput">Username (3-30 chars, letters/numbers/._-):</label>
            <input type="text" id="usernameInput" required minlength="3" maxlength="30">
            <label for="passwordInput">Password (8+ chars, letter + number):</label>
            <input type="password" id="passwordInput" required minlength="8">
            <label for="confirmPasswordInput">Confirm Password:</label>
            <input type="password" id="confirmPasswordInput" required minlength="8">
            <button type="button" id="completeBtn">Complete</button>
            <div id="error"></div>
            <div id="success"></div>
        </form>
        <p id="emailDisplay"></p>
    </main>
    <footer>
        <p>&copy; 2023 Login App</p>
    </footer>
    <script src="js/main.js" defer></script>
    <script src="js/form.js" defer></script>
</body>
</html>
