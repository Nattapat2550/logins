<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <form id="passwordForm">
    <h2>Set Password</h2>
    <input type="email" id="email" placeholder="Email" value="" readonly>
    <input type="password" id="password" placeholder="Password" required>
    <label>
      <input type="checkbox" id="hidePassword"> Hide Password
    </label>
    <button type="submit">Set Password & Login</button>
  </form>
  <script src="js/auth.js"></script>
  <script>
    // Pre-fill email
    document.getElementById('email').value = localStorage.getItem('verifiedEmail') || '';
  </script>
</body>
</html>
