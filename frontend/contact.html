<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Login App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Contact</h1>
        <nav><ul></ul></nav>
    </header>
    <main>
        <h2>Contact Us</h2>
        <p>Send us a message for support or feedback.</p>
        <form id="contactForm">
            <label for="contactName">Name:</label>
            <input type="text" id="contactName" required maxlength="100">
            <label for="contactEmail">Email:</label>
            <input type="email" id="contactEmail" required maxlength="254">
            <label for="contactMessage">Message:</label>
            <textarea id="contactMessage" required rows="5" maxlength="1000" placeholder="Your message here..."></textarea>
            <button type="submit" id="contactSubmit">Send Message</button>
        </form>
        <div id="error"></div>
        <div id="success"></div>
        <p><a href="home.html">Back to Home</a> | <a href="about.html">About</a></p>
    </main>
    <footer>
        <p>&copy; 2023 Login App</p>
    </footer>
    <script src="js/main.js" defer></script>
    <script>
        // Simple client-side form handling (placeholder; no backend endpoint per spec)
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('contactSubmit');
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');

            function showMessage(msg, type) {
                const el = type === 'success' ? successEl : errorEl;
                el.textContent = msg;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 5000);
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('contactName').value.trim();
                const email = document.getElementById('contactEmail').value.trim();
                const message = document.getElementById('contactMessage').value.trim();
                if (!name || !email || !message || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showMessage('Please fill all fields with valid data.', 'error');
                    return;
                }
                if (message.length < 10) {
                    showMessage('Message must be at least 10 characters.', 'error');
                    return;
                }
                // Placeholder: Alert (in production, integrate with backend if needed)
                alert(`Thank you, ${name}! Your message has been sent to ${email}.\n\nMessage: ${message}`);
                form.reset();
                showMessage('Message sent successfully (simulated).', 'success');
            });
        });
    </script>
</body>
</html>
