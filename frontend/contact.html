<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">AuthSystem</a>
        
        <div class="navbar-nav">
            <a href="home.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link">Contact</a>
            
            <div id="auth-buttons" class="hidden">
                <a href="login.html" class="btn">Login</a>
            </div>
            
            <div id="user-menu" class="user-menu hidden">
                <img src="images/User.png" alt="User" class="user-avatar" id="user-avatar">
                <div class="dropdown-menu" id="dropdown-menu">
                    <span class="dropdown-item" id="user-name">Username</span>
                    <a href="settings.html" class="dropdown-item">Settings</a>
                    <a href="#" class="dropdown-item" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page">
            <h1>Contact Us</h1>
            
            <div class="contact-content mt-4">
                <div class="contact-info">
                    <h2>Get in Touch</h2>
                    <p>Have questions or need support? We're here to help!</p>
                    
                    <div class="contact-details mt-4">
                        <div class="contact-item">
                            <h3>Email Support</h3>
                            <p>support@authsystem.com</p>
                        </div>
                        <div class="contact-item">
                            <h3>Response Time</h3>
                            <p>Typically within 24 hours</p>
                        </div>
                    </div>
                </div>
                
                <div class="contact-form-card mt-5">
                    <h2>Send us a Message</h2>
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="contact-name">Your Name</label>
                            <input type="text" id="contact-name" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-email">Email Address</label>
                            <input type="email" id="contact-email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" placeholder="How can we help you?" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('Thank you for your message! In a real implementation, this would send your message to our support team.');
                    contactForm.reset();
                });
            }
        });
    </script>
</body>
</html>
