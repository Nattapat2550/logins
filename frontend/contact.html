<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>Contact Us</h1>
    <p>Reach out to us for any questions.</p>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <p>(Form submission not connected to backend; extend as needed.)</p>
    <a href="/home">Back to Home</a> | <a href="/about">About</a>
  </div>
  <script src="../js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : null;
      if (user) {
        window.common.renderNavbar(user);
      } else {
        document.getElementById('navbar').innerHTML = `
          <div class="navbar">
            <div class="site-name">My Website</div>
            <div>
              <a href="/login" style="color: white; margin-right: 1rem; text-decoration: none;">Login</a>
              <a href="/register" style="color: white; text-decoration: none;">Register</a>
            </div>
          </div>
        `;
      }
      window.common.applyDarkMode();

      // Basic form handling (alert for demo)
      document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Message sent! (Demo)');
      });
    });
  </script>
</body>
</html>
