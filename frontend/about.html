<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>About Us</h1>
    <p>This is the about page. Learn more about our site.</p>
    <a href="/home">Back to Home</a> | <a href="/contact">Contact</a>
  </div>
  <script src="../js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : null;
      if (user) {
        window.common.renderNavbar(user);
      } else {
        // Render simple navbar for public pages
        document.getElementById('navbar').innerHTML = `
          <div class="navbar">
            <div class="site-name">My Website</div>
            <div>
              <a href="/login" style="color: white; margin-right: 1rem; text-decoration: none;">Login</a>
              <a href="/register" style="color: white; text-decoration: none;">Register</a>
            </div>
          </div>
        `;
      }
      window.common.applyDarkMode();
    });
  </script>
</body>
</html>
