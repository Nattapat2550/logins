<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav><!-- Navbar as above --></nav>
  <main>
    <div class="card">
      <h1>About Us</h1>
      <div id="about"><!-- Dynamic from /api/homepage --></div>
    </div>
  </main>
  <script src="js/main.js"></script>
  <script>
    // Load content
    fetch('/api/homepage')
      .then(res => res.json())
      .then(content => {
        content.forEach(item => {
          if (item.section === 'about') {
            document.getElementById('about').innerHTML = item.content;
          }
        });
      });
  </script>
</body>
</html>
