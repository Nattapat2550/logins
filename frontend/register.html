<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyAuthApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit" class="btn btn-primary">Send Verification Code</button>
        </form>
        <p>Or</p>
        <a href="https://backendlogins.onrender.com/api/auth/google" class="btn btn-google">Register with Google</a> <!-- Update backend URL -->
        <div id="message"></div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const result = await register(email);
            showMessage(result.message, result.success);
            if (result.success) window.location.href = 'check.html?email=' + encodeURIComponent(email);
        });
    </script>
</body>
</html>
