<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>Register</h1>
    <form id="registerForm">
      <input type="email" id="email" placeholder="Email" required>
      <button type="button" onclick="checkEmail()">Check Email & Send Code</button>
      <div id="error"></div>
      <button type="button" onclick="window.location.href='https://accounts.google.com/o/oauth2/auth?client_id=GOOGLE_CLIENT_ID&redirect_uri=GOOGLE_CALLBACK_URI&scope=email%20profile&response_type=code&access_type=offline'">Google Login</button> <!-- Update URLs with actual -->
    </form>
  </div>
  <script src="js/main.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
