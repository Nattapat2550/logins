<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit" class="btn btn-primary">Send Verification Code</button>
        </form>
        <p id="message"></p>
        <a href="login.html">Already registered? Login</a>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>  <!-- Loads showMessage globally -->
    <script>
        // Defer until page/DOM loaded (fixes race with ui.js)
        window.addEventListener('load', () => {
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                if (!ui.isValidEmail(email)) {
                    showMessage('Invalid email', false);
                    return;
                }
                try {
                    const response = await register(email);
                    showMessage(response.message || response.error || 'Unknown error', response.success || false);
                    if (response.success) {
                        setTimeout(() => window.location.href = 'check.html?email=' + encodeURIComponent(email), 2000);
                    }
                } catch (err) {
                    showMessage('Network error - try again', false);
                }
            });
        });
    </script>
</body>
</html>
