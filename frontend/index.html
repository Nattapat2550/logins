<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="page">
            <div class="card page-card">
                <h2 class="text-center">Create Account</h2>
                <form id="register-form" class="mt-4">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <button type="submit" class="btn">Send Verification Code</button>
                </form>
                
                <div class="text-center mt-4">
                    <p>Already have an account? <a href="#" onclick="window.location.href='index.html?login=true'">Login</a></p>
                    <button class="btn btn-secondary mt-3" onclick="loginWithGoogle()">Login with Google</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
