<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="page">
            <div class="card page-card">
                <div class="text-center">
                    <img src="https://placeholder-image-service.onrender.com/image/100x100?prompt=Email%20verification%20icon%20with%20envelope%20and%20checkmark&id=verify-icon" 
                         alt="Email verification icon with envelope and checkmark" 
                         class="mb-3">
                    <h2>Verify Your Email</h2>
                    <p class="mb-4">We've sent a 6-digit verification code to your email address</p>
                </div>
                
                <form id="verify-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="code">Verification Code</label>
                        <input type="text" id="code" placeholder="Enter 6-digit code" required 
                               maxlength="6" pattern="[0-9]{6}" title="Please enter a 6-digit code">
                        <small class="text-muted">Check your email for the verification code</small>
                    </div>
                    <button type="submit" class="btn">Verify Code</button>
                </form>
                
                <div class="mt-4 text-center">
                    <p>Didn't receive the code? <a href="#" onclick="resendCode()">Resend code</a></p>
                    <p>Or <a href="login.html">go back to login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function resendCode() {
            const email = document.getElementById('email').value;
            if (email) {
                // In a real implementation, this would call the API to resend the code
                alert(`Verification code would be resent to ${email}`);
            } else {
                alert('Please enter your email address first');
            }
        }
    </script>
</body>
</html>
