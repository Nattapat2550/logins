<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code - MyAuthApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Verify Email</h2>
        <p>Enter 6-digit code sent to your email.</p>
        <form id="verifyForm">
            <input type="text" id="code" placeholder="123456" maxlength="6" required>
            <button type="submit" class="btn btn-primary">Verify</button>
        </form>
        <div id="message"></div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (!email) window.location.href = 'register.html';

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const result = await verify(email, code);
            showMessage(result.message, result.success);
            if (result.success) window.location.href = 'form.html?email=' + encodeURIComponent(email);
        });
    </script>
</body>
</html>
