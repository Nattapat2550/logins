<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <form id="verifyForm">
    <h2>Enter Verification Code</h2>
    <input type="email" id="email" placeholder="Email" value="" readonly> <!-- Pre-filled from localStorage if available -->
    <input type="text" id="code" placeholder="6-digit code" maxlength="6" required>
    <button type="submit">Verify</button>
  </form>
  <script src="js/auth.js"></script>
  <script>
    // Pre-fill email
    document.getElementById('email').value = localStorage.getItem('regEmail') || '';
  </script>
</body>
</html>
