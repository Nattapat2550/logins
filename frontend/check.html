<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code - Auth System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="page">
            <div class="card page-card">
                <h2 class="text-center">Verify Your Email</h2>
                <p class="text-center mb-4">We've sent a 6-digit code to your email</p>
                
                <form id="verify-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="code">Verification Code</label>
                        <input type="text" id="code" placeholder="Enter 6-digit code" required maxlength="6">
                    </div>
                    <button type="submit" class="btn">Verify Code</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
