<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <nav id="navbar">
            <h2>Admin Dashboard</h2>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </nav>
        <div id="adminContent">
            <h3>Recent Users</h3>
            <ul id="usersList"></ul>
            <h3>Home Content</h3>
            <p id="adminHomeContent"></p>
            <form id="adminEditForm">
                <textarea id="adminContentEdit" rows="5"></textarea>
                <button type="submit" class="btn btn-primary">Update Content</button>
            </form>
        </div>
        <p id="message"></p>
        <a href="home.html" class="btn btn-info">Back to Home</a>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || user.role !== 'admin') {
            window.location.href = 'login.html';
            return;
        }

        // Load admin data
        getAdminDashboard().then(response => {
            if (response.success) {
                document.getElementById('adminHomeContent').textContent = response.homeContent;
                document.getElementById('adminContentEdit').value = response.homeContent;
                const usersList = document.getElementById('usersList');
                response.recentUsers.forEach(u => {
                    const li = document.createElement('li');
                    li.textContent = `${u.username || u.email} (${u.role}, ${u.verified ? 'Verified' : 'Pending'})`;
                    usersList.appendChild(li);
                });
            }
        });

        document.getElementById('adminEditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('adminContentEdit').value;
            const response = await updateHomeContent(content);  // Admin can update
            showMessage(response.message || response.error, response.success);
            if (response.success) {
                document.getElementById('adminHomeContent').textContent = content;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
