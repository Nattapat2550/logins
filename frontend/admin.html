<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">Website Name - Admin</div>
        <div class="nav-center">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <img id="profileImg" src="" alt="Profile" onclick="toggleDropdown()">
            <div id="dropdown" class="dropdown" style="display:none;">
                <a href="settings.html">Settings</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Admin Panel</h2>
        <h3>Manage Users</h3>
        <div id="usersList">Loading users...</div>
        <h3>Edit Home Content</h3>
        <form id="homeContentForm">
            <textarea id="homeContent" rows="5" placeholder="Home page content"></textarea>
            <button type="submit">Update Content</button>
        </form>
    </div>
    <div id="message"></div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Protected: admin only
        if (!checkAuth('login.html', true)) return;

        const user = JSON.parse(localStorage.getItem('user'));
    const baseUrl = API_BASE.replace('/api', '');  // e.g., https://backendlogins.onrender.com
    
    let imgSrc;
    if (user.profile_pic && user.profile_pic.startsWith('http')) {
        // Google URL: Use directly (no /uploads)
        imgSrc = user.profile_pic;
    } else {
        // Local upload: Prepend /uploads
        imgSrc = `${baseUrl}/uploads/${user.profile_pic || 'user.png'}`;
    }
    
    document.getElementById('profileImg').src = imgSrc;
    document.getElementById('profileImg').title = user.username || user.email;

        // Load users
        loadAdminUsers();

        // Load current home content
        fetchHomeContent().then(content => {
            document.getElementById('homeContent').value = content;
        }).catch(err => showMessage(err.message, true));

        // Update home content
        document.getElementById('homeContentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('homeContent').value || 'Welcome to our website!';
            const result = await updateHomeContent(content);
            showMessage(result.message || result.error, !result.success);
        });

        initUI();
    </script>
</body>
</html>
