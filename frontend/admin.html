<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">Website Name - Admin</div>
        <div class="nav-center">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <img id="profileImg" src="" alt="Profile" onclick="toggleDropdown()">
            <div id="dropdown" class="dropdown" style="display:none;">
                <a href="settings.html">Settings</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Admin Panel</h2>
        <h3>Manage Users</h3>
        <div id="usersList">Loading users...</div>
        <h3>Edit Home Content</h3>
        <form id="homeContentForm">
            <textarea id="homeContent" rows="5" placeholder="Home page content"></textarea>
            <button type="submit">Update Content</button>
        </form>
    </div>
    <div id="message"></div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Protected: Check login and admin role
        if (!localStorage.getItem('token') || !localStorage.getItem('user')) {
            window.location.href = 'login.html';
            return;
        }
        const user = JSON.parse(localStorage.getItem('user'));
        if (user.role !== 'admin') {
            window.location.href = 'home.html';
            return;
        }
        document.getElementById('profileImg').src = `${API_BASE.replace('/api', '')}/uploads/${user.profile_pic || 'user.png'}`;
        document.getElementById('profileImg').title = user.username || user.email;

        // Load users
        loadAdminUsers();

        // Load and set current home content
        fetchHomeContent().then(content => {
            document.getElementById('homeContent').value = content;
        });

        // Update home content
        document.getElementById('homeContentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('homeContent').value;
            const result = await updateHomeContent(content);
            document.getElementById('message').textContent = result.message || result.error;
        });

        // Load users function
        async function loadAdminUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const users = await response.json();
                let html = '<ul>';
                users.forEach(u => {
                    html += `
                        <li>
                            ${u.username || u.email} (ID: ${u.id}, Role: ${u.role}, Verified: ${u.verified})
                            <button onclick="editUser (${u.id})">Edit</button>
                            <button onclick="deleteUser (${u.id})">Delete</button>
                        </li>
                    `;
                });
                html += '</ul>';
                document.getElementById('usersList').innerHTML = html;

                // Add edit form dynamically (simple modal-like)
                window.editUser  = async (id) => {
                    const username = prompt('New username:');
                    const role = prompt('New role (user/admin):');
                    const verified = prompt('Verified (true/false):');
                    if (username || role || verified) {
                        const result = await updateUser (id, { username, role, verified: verified === 'true' });
                        document.getElementById('message').textContent = result.message || result.error;
                        loadAdminUsers();  // Reload
                    }
                };

                window.deleteUser  = async (id) => {
                    if (confirm('Delete user?')) {
                        const result = await deleteAdminUser (id);
                        document.getElementById('message').textContent = result.message || result.error;
                        loadAdminUsers();  // Reload
                    }
                };
            } catch (err) {
                document.getElementById('usersList').innerHTML = 'Error loading users';
            }
        }

        initUI();
    </script>
</body>
</html>
