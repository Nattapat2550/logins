<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>Admin Panel</h1>
    
    <!-- Homepage Content Editor -->
    <h2>Edit Homepage Content</h2>
    <textarea id="homepageContent" rows="5" cols="50" placeholder="Current homepage content..."></textarea>
    <br>
    <button onclick="updateHomepage()">Save Homepage Content</button>
    <div id="hpError"></div>

    <!-- Users Management -->
    <h2>Manage Users</h2>
    <table id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Username</th>
          <th>Profile Pic</th>
          <th>Role</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="usersError"></div>
  </div>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
