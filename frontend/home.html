<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="css/styles.css">
  <button id="themeToggle">Toggle Dark Mode</button>
</head>
<body>
  <div class="home-content">
    <h1 id="homeTitle">Loading...</h1>
    <p id="homeContent">Loading content...</p>
  </div>
  <script src="js/main.js"></script>
  <script>
    // Fetch home info (public endpoint? For simplicity, use admin endpoint but without auth for read)
    // Note: To make public, add a public route in backend/routes/home.js: router.get('/', adminController.getHomeInfo);
    // For now, assume logged-in users can access; if error, show default.
    const token = localStorage.getItem('token');
    fetch('/api/admin/home' + (token ? `?token=${token}` : '')) // Hacky; better add public route
      .then(res => res.json())
      .then(data => {
        document.getElementById('homeTitle').textContent = data.title;
        document.getElementById('homeContent').textContent = data.content;
      })
      .catch(() => {
        document.getElementById('homeTitle').textContent = 'Welcome to Our Site';
        document.getElementById('homeContent').textContent = 'This is the home page content.';
      });
  </script>
</body>
</html>
