<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <h1>Home</h1>
            <div>
                <a href="settings.html">Settings</a>
                <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
                <button id="logout">Logout</button>
            </div>
        </nav>
        <div id="homeContent">
            <h2>Welcome, <span id="username"></span>!</h2>
            <div id="homeInfo"></div>
        </div>
        <div id="message"></div>
        <nav class="bottom-nav">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script>
        checkAuth().then(isAuth => {
            if (!isAuth) {
                showMessage('Please log in', 'error');
                setTimeout(() => window.location.href = 'login.html', 1000);
                return;
            }
            loadHome();
        });

        async function loadHome() {
            try {
                const profile = await apiGet('/api/user/profile');
                document.getElementById('username').textContent = profile.username;
                if (profile.role === 'admin') {
                    document.getElementById('adminLink').style.display = 'inline';
                }

                const info = await apiGet('/api/admin/home');
                document.getElementById('homeInfo').innerHTML = `
                    <h3>${info.title || 'Welcome'}</h3>
                    <p>${info.content || 'This is your dashboard. Use settings to update your profile.'}</p>
                `;
            } catch (err) {
                showMessage('Error loading home: ' + err.message, 'error');
            }
        }

        document.getElementById('logout').addEventListener('click', logout);
    </script>
</body>
</html>
