<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Login App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="home.html" class="logo">Login App</a>
    <ul id="navLinks">
      <li><a href="settings.html">Settings</a></li>
      <li id="adminLink" class="hidden"><a href="admin.html">Admin</a></li>
      <li><button id="logoutBtn" class="secondary">Logout</button></li>
      <li><button id="themeToggle" class="theme-toggle">🌙</button></li>
    </ul>
  </nav>

  <main>
    <div class="container">
      <h1 id="welcome">Welcome!</h1>
      <div id="userInfo" class="user-card">
        <img id="profilePic" src="images/user.png" alt="Profile" style="width: 100px; height: 100px; border-radius: 50%;">
        <div>
          <h2 id="username">Loading...</h2>
          <p id="email">Loading...</p>
          <p id="role">Loading...</p>
          <p id="joined">Loading...</p>
        </div>
      </div>
      <div id="alert" class="alert hidden"></div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/home.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      setupNavbar();
      loadHomeData();
    });
  </script>
</body>
</html>
