<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - MyAuthApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h1>MyAuthApp</h1>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right" id="profileDropdown">
            <img src="user.png" alt="Profile" id="profilePic" class="profile-pic">
            <div class="dropdown" id="dropdownMenu">
                <a href="settings.html">Settings</a>
                <a href="#" id="logout">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Welcome, <span id="username"></span>!</h2>
        <div id="homeContent">
            <h3 id="homeTitle">Loading...</h3>
            <p id="homeText">Loading content...</p>
            <button id="editHomeBtn" class="btn btn-secondary" style="display:none;">Edit Content (Admin Only)</button>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Load user and content on page load
        async function loadPage() {
            const token = getToken();
            if (!token) return window.location.href = 'login.html';

            const profile = await getProfile();
            if (profile.success) {
                document.getElementById('username').textContent = profile.user.username;
                document.getElementById('profilePic').src = profile.user.profile_pic || 'user.png';
                toggleTheme(profile.user.theme);  // Apply theme
            }

            const content = await getHomeContent();
            if (content.success) {
                document.getElementById('homeTitle').textContent = content.content.title;
                document.getElementById('homeText').textContent = content.content.content;
                if (profile.user.role === 'admin') {
                    document.getElementById('editHomeBtn').style.display = 'block';
                    document.getElementById('editHomeBtn').onclick = () => window.location.href = 'admin.html';
                }
            }
        }
        loadPage();

        // Logout
        document.getElementById('logout').addEventListener('click', () => {
            clearToken();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
