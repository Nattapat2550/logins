<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <h1>Reset Password</h1>
    <div id="step1">
      <form id="forgotForm">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="button" onclick="sendResetCode()">Send Code</button>
      </form>
    </div>
    <div id="step2" class="hidden">
      <input type="text" id="code" placeholder="Enter reset code" maxlength="6" required>
      <button type="button" onclick="verifyResetCode()">Verify Code</button>
    </div>
    <div id="step3" class="hidden">
      <input type="password" id="newPassword" placeholder="New Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
      <button type="button" onclick="setNewPassword()">Set Password</button>
    </div>
    <div id="error"></div>
    <div id="success" class="hidden"></div>
  </div>
  <script src="js/main.js"></script>
  <script src="js/reset.js"></script>
</body>
</html>
